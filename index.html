<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<center>
    <form action="./login.html">

        <h1>Registration Form</h1>
        
        <p>
            Name: <input type="text" placeholder="Enter name" required />
        </p>

        <p>
            Email: <input type="email" placeholder="Enter email" required/>
        </p>

        <p>
            Password: <input type="password" placeholder="Enter Password" required />
        </p>

        <p>
            Confirm Password: <input type="password" placeholder="Confirm Password" required/>
        </p>

        <p>
            Mobile Number: <input type="text" placeholder="Enter Mobile No" required/>
        </p>

        <p>
            <input type="radio" name="gender" required/>Male
            <input type="radio" name="gender" required/>Female
        </p>
        
        <p>
            <input type="checkbox">10th
            <input type="checkbox">Intermediate
            <input type="checkbox">Degree
            <input type="checkbox">Diploma
            <input type="checkbox">Btech
        </p>

        <!-- <p>
            <input type="file">
        </p> -->

        <p>
            DOB: <input type="date" required/>
        </p>

        <button>Register</button>

    </form>
</center>
</body>
</html>
